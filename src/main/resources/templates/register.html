<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Página de Registro</title>

    <link rel="stylesheet" th:href="@{/css/register/register.css}">
    <link rel="stylesheet" th:href="@{/css/register/register_button.css}">
    <script th:src="@{/css/js/register.js}"></script>

</head>
<body>
<main>
    <div class="header">
        <header>
            <h1>CADASTRAR ADMINISTRADOR</h1>
        </header>
    </div>

    <div class="form_page">
        <form id="formulario" th:action="@{/api/register_admin}" th:object="${adminRequest}" method="POST">
            <h2>Insira os campos a seguir:</h2>
            <label for="admin">ADMIN</label>
            <input type="text" id="admin" th:field="*{usuario}" required>
            <span th:if="${#fields.hasErrors('usuario')}" th:errors="*{usuario}"
                  style="color: #ef4444; font-size: 12px; margin-top: 4px; display: block;"></span>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" th:field="*{cpf}" maxlength="14" placeholder="000.000.000-00" required>
            <span th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"
                  style="color: #ef4444; font-size: 12px; margin-top: 4px; display: block;"></span>

            <label for="senha">SENHA</label>
            <input type="password" id="senha" th:field="*{senha}" minlength="6" maxlength="100" required>
            <span th:if="${#fields.hasErrors('senha')}"
                  style="color: #ef4444; font-size: 12px; margin-top: 4px; display: block;"></span>

            <button type="submit">REGISTRAR</button>
        </form>
    </div>

</main>

</body>
</html>
